name: architecture-audit

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend deps
        run: python3 -m pip install -r player-web/server/requirements.txt

      - name: Run architecture audit
        run: python3 scripts/audit_architecture.py

      - name: Build frontend
        working-directory: player-web
        run: npm ci && npm run build

      - name: Smoke test
        run: |
          python3 scripts/generate_player_radar.py \
            --input templates/player_chart_template.csv \
            --output out/player_charts/smoke_test_ci.png \
            --title "Smoke Test" \
            --subtitle "Template Validation"
