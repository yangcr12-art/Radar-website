{
  "required_paths": [
    "docs/ARCHITECTURE_RULES.md",
    "scripts/audit_architecture.py",
    "scripts/audit_rules.yml",
    "player-web/src/app/.gitkeep",
    "player-web/src/widgets/.gitkeep",
    "player-web/src/features/.gitkeep",
    "player-web/src/entities/.gitkeep",
    "player-web/src/shared/.gitkeep",
    "player-web/src/pages/home/HomePage.tsx",
    "player-web/src/pages/about/AboutPage.tsx",
    "player-web/src/pages/player-data/PlayerDataPage.tsx",
    "player-web/server/server_core/services/ranking_service.py",
    ".github/workflows/architecture-audit.yml"
  ],
  "max_lines": {
    "player-web/src/App.tsx": 2000,
    "player-web/server/app.py": 700,
    "player-web/src/styles.css": 900
  },
  "forbidden_patterns": [
    {
      "glob": "player-web/src/pages/**/*.tsx",
      "pattern": "fetch\\(",
      "message": "pages 层禁止直接调用 fetch，请走 shared/api"
    },
    {
      "glob": "player-web/src/pages/**/*.tsx",
      "pattern": "localStorage\\.",
      "message": "pages 层禁止直接读写 localStorage，请走 shared/lib"
    }
  ],
  "required_substrings": [
    {
      "path": "player-web/server/app.py",
      "substring": "from server_core.services.ranking_service import",
      "message": "后端入口必须依赖 service 层，避免业务逻辑全部堆在 app.py"
    }
  ]
}
